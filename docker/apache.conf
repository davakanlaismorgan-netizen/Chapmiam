# =============================================================================
# Chap'miam — docker/apache.conf
# Configuration Apache pour Docker + Render
# =============================================================================
#
# POINTS CLÉS :
#   - ServerName * : accepte n'importe quel hostname (cloud Render)
#   - DocumentRoot → /var/www/html/public/ (le répertoire public de l'app)
#   - AllowOverride All : active .htaccess (mod_rewrite, headers, etc.)
#   - Port : injecté par le script entrypoint.sh depuis $PORT
#   - Logs → /dev/stdout & /dev/stderr (standard Docker/Render)
#   - Pas de redirection HTTPS ici (Render gère HTTPS en amont)
# =============================================================================

<VirtualHost *:${APACHE_PORT}>

    # ── Identité ──────────────────────────────────────────────────────────────
    ServerName localhost
    ServerAlias *

    # ── DocumentRoot : DOSSIER PUBLIC uniquement ──────────────────────────────
    DocumentRoot /var/www/html/public

    # ── Options du dossier racine de l'app ───────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes -MultiViews +FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # ── Options du dossier public (accessible web) ────────────────────────────
    <Directory /var/www/html/public>
        Options -Indexes -MultiViews +FollowSymLinks

        # CRITIQUE : autoriser .htaccess (mod_rewrite + headers)
        AllowOverride All

        Require all granted
    </Directory>

    # ── Protection : bloquer l'accès aux dossiers sensibles ──────────────────
    <Directory /var/www/html/app>
        Require all denied
    </Directory>
    <Directory /var/www/html/logs>
        Require all denied
    </Directory>
    <Directory /var/www/html/storage>
        Require all denied
    </Directory>
    <Directory /var/www/html/database>
        Require all denied
    </Directory>

    # ── Logs → STDOUT/STDERR (standard Docker) ────────────────────────────────
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
    LogLevel warn

    # ── Désactiver la révélation du serveur ───────────────────────────────────
    ServerSignature Off

</VirtualHost>
